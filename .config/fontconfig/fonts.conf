<match target="pattern">
  <test qual="any" name="family">
    <string>serif</string>
  </test>
  <edit name="family" mode="assign">
    <string>Noto Sans Mono</string>
  </edit>
</match>

<match target="pattern">
  <test qual="any" name="family">
    <string>sans-serif</string>
  </test>
  <edit name="family" mode="assign">
    <string>Noto Sans Mono</string>
  </edit>
</match>

<match target="pattern">
  <test qual="any" name="family">
    <string>monospace</string>
  </test>
  <edit name="family" mode="assign">
    <string>Noto Sans Mono</string>
  </edit>
</match>
